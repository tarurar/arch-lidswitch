name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate the release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be strict SemVer (for example, v0.1.0): $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check out the tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Lua 5.4
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends lua5.4

      - name: Check tagged source
        env:
          LUA_BIN: /usr/bin/lua5.4
          LUAC: /usr/bin/luac5.4
        run: make check

      - name: Package release assets
        run: ./scripts/package-release.sh release

      - name: Publish the verified tag and assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          remote_ref="refs/tags/$RELEASE_TAG"
          peeled_ref="${remote_ref}^{}"
          remote_refs=$(git ls-remote --exit-code origin \
            "$remote_ref" "$peeled_ref")
          remote_object=$(awk -v ref="$remote_ref" \
            '$2 == ref { print $1 }' <<< "$remote_refs")
          remote_commit=$(awk -v ref="$peeled_ref" \
            '$2 == ref { print $1 }' <<< "$remote_refs")
          if [[ -z "$remote_commit" ]]; then
            remote_commit=$remote_object
          fi
          built_commit=$(git rev-parse HEAD)
          if [[ -z "$remote_object" || "$remote_commit" != "$built_commit" || \
            ( "$GITHUB_SHA" != "$remote_object" && \
              "$GITHUB_SHA" != "$remote_commit" ) ]]; then
            echo "Remote tag no longer resolves to the tested commit" >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            release/install-hyprland-lid-switch.sh \
            release/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG"
