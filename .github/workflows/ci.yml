name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends lua5.4
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install coreutils
          coreutils_bin="$(brew --prefix coreutils)/libexec/gnubin"
          coreutils_version="$("$coreutils_bin/mv" --version | awk 'NR == 1 { print $NF }')"
          minimum_coreutils_version=9.11
          if [[ "$(printf '%s\n' \
            "$minimum_coreutils_version" "$coreutils_version" \
            | sort -V | head -n 1)" != "$minimum_coreutils_version" ]]; then
            echo "GNU coreutils $minimum_coreutils_version or newer required; found $coreutils_version" >&2
            exit 1
          fi
          echo "$coreutils_bin" >> "$GITHUB_PATH"
      - name: Check generated files, syntax, and behavior
        env:
          LUA_BIN: /usr/bin/lua5.4
          LUAC: /usr/bin/luac5.4
        run: make check
